<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Outer is the open-source backend you own 100% — embedded Postgres, auth, typed RPC, and generated CRUD in a single deploy. An alternative to Supabase, PocketBase, and Firebase with no vendor lock-in."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Outer" />
    <meta property="og:url" content="https://outer.now" />
    <meta property="og:title" content="Outer — Own your backend" />
    <meta
      property="og:description"
      content="Database, auth, typed RPC, and generated CRUD in one tiny package. Deploy it with your app on any VPS — you own the code and the data."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Outer — Own your backend" />
    <meta
      name="twitter:description"
      content="Database, auth, typed RPC, and generated CRUD in one tiny package. Deploy it with your app on any VPS — you own the code and the data."
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="generator" content="Imprensa" />
    <script
      defer
      src="https://umami.guarana.studio/script.js"
      data-website-id="82b68271-4292-4621-a641-38a1c27d2c0b"
    ></script>
    <script>
      (function () {
        var stored = localStorage.getItem("imprensa:theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
        document.documentElement.dataset.themeReady = "";
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("imprensa:sidebar-layout");
          if (!raw) return;
          var layout = JSON.parse(raw);
          if (!Array.isArray(layout) || layout.length !== 2) return;
          var a = layout[0],
            b = layout[1];
          if (typeof a !== "number" || typeof b !== "number") return;
          var root = document.documentElement;
          root.dataset.imprensaSidebarLayout = "1";
          root.style.setProperty("--imprensa-sidebar-pct", String(a));
          root.style.setProperty("--imprensa-content-pct", String(b));
        } catch (e) {}
      })();
    </script>
    <style id="imprensa-sidebar-layout-boot">
      html[data-imprensa-sidebar-layout]
        [data-slot="resizable"]
        > [data-slot="resizable-panel"]:first-child {
        flex-grow: var(--imprensa-sidebar-pct) !important;
      }
      html[data-imprensa-sidebar-layout]
        [data-slot="resizable"]
        > [data-slot="resizable-panel"]:last-child {
        flex-grow: var(--imprensa-content-pct) !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts" prerender></script>
  </body>
</html>
